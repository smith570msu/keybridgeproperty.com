<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Keybridge Properties</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--cream); padding: 80px 24px; }
    .error-card { background: #fff; border-radius: 14px; box-shadow: 0 14px 40px rgba(20,38,76,0.14); padding: 56px 48px; max-width: 520px; width: 100%; text-align: center; }
    .error-number { font-family: 'Lora', Georgia, serif; font-size: 80px; font-weight: 600; color: var(--gold); line-height: 1; margin-bottom: 16px; }
    .error-card h1 { font-size: 28px; margin-bottom: 14px; }
    .error-card p { color: var(--slate); margin-bottom: 32px; }
  </style>
</head>
<body>
<main class="error-page">
  <div class="error-card">
    <div class="error-number">404</div>
    <h1>Page not found.</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <a href="/" class="btn btn-primary btn-lg">Go to homepage</a>
      <a href="/#offer-form" class="btn btn-gold btn-lg">Get a cash offer</a>
      <a href="tel:+12482680909" style="font-size:15px;font-weight:600;color:var(--navy);margin-top:8px;">Or call (248) 268-0909</a>
    </div>
  </div>
</main>
<script src="main.js"></script>
</body>
</html>
